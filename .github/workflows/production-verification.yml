name: Production Verification

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify-production:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify live production
        run: npm run verify:production

      - name: Upload production Lighthouse reports
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: lighthouse-production-reports
          path: .lighthouseci-production
          if-no-files-found: ignore
