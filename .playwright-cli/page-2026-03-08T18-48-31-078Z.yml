              - listitem [ref=e53]: Civant analyzes publicly available procurement data.
              - listitem [ref=e54]: Civant supports earlier preparation and more intentional planning.
          - article [ref=e55]:
            - heading "What Civant is not" [level=3] [ref=e56]
            - list [ref=e57]:
              - listitem [ref=e58]: Civant is not an insider tool or source of non-public information.
              - listitem [ref=e59]: Civant is not a tender issuer, influencer, or intermediary.
              - listitem [ref=e60]: Civant does not guarantee tender outcomes.
              - listitem [ref=e61]: Civant does not replace sales strategy, account management expertise, or commercial judgement.
