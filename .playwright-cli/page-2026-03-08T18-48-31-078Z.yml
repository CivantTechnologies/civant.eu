      - generic [ref=e11]:
        - paragraph [ref=e12]: Company
        - heading "Who we are and why we exist" [level=1] [ref=e13]
        - paragraph [ref=e14]: Civant was built from practical procurement operating experience and is focused on enabling structured, earlier, and better-timed decisions in public-sector markets.
      - generic [ref=e17]:
        - paragraph [ref=e18]: Background
        - heading "Civant originated from real operational procurement pressure" [level=2] [ref=e19]
        - paragraph [ref=e20]: Civant Technologies was founded in Ireland by David Manrique, after more than 15 years working in SaaS and educational technology with public-sector buyers and suppliers across international markets.
        - paragraph [ref=e21]: Over time, David saw strong teams lose opportunities not because solutions were weak, but because tenders surfaced too late and decisions were forced under compressed timelines.
        - paragraph [ref=e22]: While entering new markets, he manually mapped institutions, incumbents, and renewal cycles with spreadsheets and reminders. That manual process exposed a systemic visibility gap in procurement planning and became the first real iteration of Civant.
        - paragraph [ref=e23]: "The underlying issue was structural: public procurement data exists, but it has not been consistently usable, connected, or organized for proactive decision-making."
        - blockquote [ref=e24]:
          - paragraph [ref=e25]: "\"When preparation replaces reaction, tenders stop being feared and start becoming a viable, repeatable path to growth.\""
          - paragraph [ref=e26]:
            - text: — David Manrique
            - text: Founder, Civant
        - link "View David Manrique on LinkedIn →" [ref=e27] [cursor=pointer]:
          - /url: https://www.linkedin.com/in/davidmanriquec/
      - generic [ref=e30]:
        - paragraph [ref=e31]: Mission
        - heading "What Civant is built to do" [level=2] [ref=e32]
        - paragraph [ref=e33]: Civant exists to transform complex public procurement processes into structured, confident, and well-timed decisions for suppliers, buyers, and the public sector.
      - generic [ref=e36]:
        - paragraph [ref=e37]: Why This Matters
        - heading "Procurement intelligence has system-level impact" [level=2] [ref=e38]
        - paragraph [ref=e39]: Public procurement is designed to support fair competition, stronger outcomes, and responsible use of public funds.
        - paragraph [ref=e40]: "When preparation time is uneven and timing visibility is poor, those goals weaken: capable suppliers are excluded, buyers receive fewer high-quality responses, and public value is reduced."
        - paragraph [ref=e41]: Making timing visible helps teams compete on merit rather than reaction speed, improves planning quality, and supports healthier market participation.
