            - list [ref=e55]:
              - listitem [ref=e56]: Civant brings visibility to public procurement opportunities.
              - listitem [ref=e57]: Civant reconciles and normalizes data from EU and national procurement sources.
              - listitem [ref=e58]: Civant analyzes publicly available procurement data.
              - listitem [ref=e59]: Civant supports earlier preparation and more intentional planning.
          - article [ref=e60]:
            - heading "What Civant is not" [level=3] [ref=e61]
            - list [ref=e62]:
              - listitem [ref=e63]: Civant is not an insider tool or source of non-public information.
              - listitem [ref=e64]: Civant is not a tender issuer, influencer, or intermediary.
              - listitem [ref=e65]: Civant does not guarantee tender outcomes.
              - listitem [ref=e66]: Civant does not replace sales strategy, account management expertise, or commercial judgement.
